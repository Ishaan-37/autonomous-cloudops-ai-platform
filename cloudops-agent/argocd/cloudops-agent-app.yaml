# ============================================================
# argocd/cloudops-agent-app.yaml
# ArgoCD Application manifest for GitOps deployment.
#
# WHAT IS ARGOCD?
#   ArgoCD is a GitOps tool for Kubernetes.
#   It watches your Git repository and automatically
#   syncs your cluster to match what's in Git.
#
#   Traditional deploy: "Run this command to deploy"
#   GitOps with ArgoCD: "The cluster ALWAYS matches Git"
#
# HOW IT WORKS:
#   1. You push code to Git (or CI/CD updates the image tag)
#   2. ArgoCD detects the change (polls every 3 minutes)
#   3. ArgoCD applies the new Helm chart to the cluster
#   4. If deployment fails, ArgoCD shows the error in its UI
#   5. You can rollback by reverting the Git commit
#
# INSTALL ARGOCD:
#   kubectl create namespace argocd
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#
# ACCESS ARGOCD UI:
#   kubectl port-forward svc/argocd-server -n argocd 8080:443
#   Open: https://localhost:8080
#   Username: admin
#   Password: kubectl -n argocd get secret argocd-initial-admin-secret \
#               -o jsonpath="{.data.password}" | base64 -d
#
# APPLY THIS FILE:
#   kubectl apply -f argocd/cloudops-agent-app.yaml
# ============================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudops-agent-staging
  namespace: argocd               # ArgoCD lives in its own namespace

  # Finalizer: when you delete this Application, ArgoCD
  # also deletes all the K8s resources it created (clean teardown)
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  # ── Source: where ArgoCD reads the desired state ──────────
  source:
    # Your Git repository
    repoURL: https://github.com/YOUR_USERNAME/cloudops-agent.git
    targetRevision: develop       # Branch to watch (use 'main' for prod)

    # Path inside the repo where the Helm chart lives
    path: helm/agent

    helm:
      # Values file to use
      valueFiles:
        - values.yaml
        - values.staging.yaml     # Staging-specific overrides

      # Individual value overrides (image tag updated by CI/CD)
      # CI/CD runs: argocd app set cloudops-agent-staging --helm-set image.tag=$GIT_SHA
      parameters:
        - name:  image.tag
          value: latest           # CI/CD overrides this with actual git SHA

  # ── Destination: where to deploy ──────────────────────────
  destination:
    server:    https://kubernetes.default.svc   # The EKS cluster ArgoCD is installed in
    namespace: cloudops-staging

  # ── Sync Policy ───────────────────────────────────────────
  syncPolicy:
    # automated: ArgoCD applies changes automatically when Git changes
    # Without this, you'd have to manually click "Sync" in the UI
    automated:
      prune:    true              # Delete K8s resources removed from Git
      selfHeal: true              # Re-apply if someone manually edits the cluster

    syncOptions:
      - CreateNamespace=true      # Create namespace if it doesn't exist
      - PruneLast=true            # Delete old resources AFTER new ones are healthy
      - RespectIgnoreDifferences=true

    # Retry failed syncs automatically
    retry:
      limit: 5
      backoff:
        duration:    5s
        factor:      2
        maxDuration: 3m

  # ── Ignore These Differences ──────────────────────────────
  # Some fields change at runtime (replica count from HPA, etc.)
  # ArgoCD would otherwise show them as "out of sync"
  ignoreDifferences:
    - group:  apps
      kind:   Deployment
      jsonPointers:
        - /spec/replicas          # HPA manages this — ignore differences

---
# Production Application (separate from staging)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudops-agent-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL:        https://github.com/YOUR_USERNAME/cloudops-agent.git
    targetRevision: main          # Production always tracks 'main' branch
    path:           helm/agent

    helm:
      valueFiles:
        - values.yaml
        - values.prod.yaml

  destination:
    server:    https://kubernetes.default.svc
    namespace: cloudops-prod

  syncPolicy:
    # Production: NO automatic sync
    # A human must click "Sync" in ArgoCD UI after reviewing changes
    # This prevents accidental production deployments
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true

    retry:
      limit: 3
      backoff:
        duration:    10s
        factor:      2
        maxDuration: 5m
